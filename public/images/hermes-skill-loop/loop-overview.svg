<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent 自动沉淀 Skill 总览</title>
  <desc id="desc">从用户任务到后台复盘、写入 skill、下次复用和 curator 整理的闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#9bdcff"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#0f141d"/>
  <text x="60" y="64" fill="#f4f7fb" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700">Hermes 不是“任务一结束就写 Skill”</text>
  <text x="60" y="102" fill="#aab7c8" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">它更像是：复杂任务做完后，后台单独复盘一次，把值得复用的经验写进技能库。</text>

  <g font-family="Arial, 'PingFang SC', sans-serif" filter="url(#shadow)">
    <rect x="58" y="172" width="190" height="120" rx="18" fill="#1a2332" stroke="#3b82f6" stroke-width="2"/>
    <text x="88" y="218" fill="#eaf2ff" font-size="24" font-weight="700">用户任务</text>
    <text x="88" y="252" fill="#b7c5d8" font-size="16">正常执行</text>
    <text x="88" y="276" fill="#b7c5d8" font-size="16">先把结果交付</text>

    <rect x="302" y="172" width="190" height="120" rx="18" fill="#1c2730" stroke="#14b8a6" stroke-width="2"/>
    <text x="332" y="218" fill="#ecfffb" font-size="24" font-weight="700">达到阈值</text>
    <text x="332" y="252" fill="#b7d9d4" font-size="16">默认累计约 10 次</text>
    <text x="332" y="276" fill="#b7d9d4" font-size="16">工具调用迭代</text>

    <rect x="546" y="172" width="190" height="120" rx="18" fill="#252233" stroke="#a78bfa" stroke-width="2"/>
    <text x="576" y="218" fill="#f1ecff" font-size="24" font-weight="700">后台复盘</text>
    <text x="576" y="252" fill="#d1c5fb" font-size="16">review fork</text>
    <text x="576" y="276" fill="#d1c5fb" font-size="16">只准用记忆/技能工具</text>

    <rect x="790" y="172" width="190" height="120" rx="18" fill="#2b241b" stroke="#f59e0b" stroke-width="2"/>
    <text x="820" y="218" fill="#fff4df" font-size="24" font-weight="700">写入 Skill</text>
    <text x="820" y="252" fill="#ead2a5" font-size="16">patch 旧的优先</text>
    <text x="820" y="276" fill="#ead2a5" font-size="16">最后才新建</text>

    <rect x="1034" y="172" width="108" height="120" rx="18" fill="#2a1f28" stroke="#fb7185" stroke-width="2"/>
    <text x="1058" y="218" fill="#ffe9ee" font-size="24" font-weight="700">复用</text>
    <text x="1058" y="252" fill="#f4bdc8" font-size="16">下次</text>
    <text x="1058" y="276" fill="#f4bdc8" font-size="16">加载</text>
  </g>

  <g stroke="#9bdcff" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M250 232 H292"/>
    <path d="M494 232 H536"/>
    <path d="M738 232 H780"/>
    <path d="M982 232 H1024"/>
  </g>

  <path d="M1088 318 C1088 402 158 402 158 318" fill="none" stroke="#4ade80" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="424" y="442" fill="#b9f7c8" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700">下次类似任务：系统提示索引、/skill-name、skill_view 都能重新找到它</text>
</svg>
