<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Curator 生命周期</title>
  <desc id="desc">Curator 根据活跃度把 skill 从 active 标为 stale，再归档到 archive，也支持 pin、dry-run 和备份。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#9bdcff"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#10141d"/>
  <text x="60" y="64" fill="#f7f9fb" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700">沉淀多了之后，Curator 负责收拾</text>
  <text x="60" y="102" fill="#aeb8c8" font-family="Arial, 'PingFang SC', sans-serif" font-size="18">它不靠 cron daemon，而是在 CLI 启动和 gateway tick 时顺手检查：到时间、够空闲，再跑一次。</text>

  <g font-family="Arial, 'PingFang SC', sans-serif" filter="url(#shadow)">
    <rect x="90" y="190" width="220" height="118" rx="18" fill="#163022" stroke="#34d399" stroke-width="2"/>
    <text x="132" y="236" fill="#e7fff3" font-size="28" font-weight="700">active</text>
    <text x="132" y="270" fill="#baf4d7" font-size="17">最近还在用</text>

    <rect x="430" y="190" width="220" height="118" rx="18" fill="#302916" stroke="#fbbf24" stroke-width="2"/>
    <text x="480" y="236" fill="#fff7df" font-size="28" font-weight="700">stale</text>
    <text x="480" y="270" fill="#ead7a0" font-size="17">默认 30 天没用</text>

    <rect x="770" y="190" width="260" height="118" rx="18" fill="#311c25" stroke="#fb7185" stroke-width="2"/>
    <text x="824" y="236" fill="#ffe8ee" font-size="28" font-weight="700">.archive/</text>
    <text x="824" y="270" fill="#f4b7c4" font-size="17">默认 90 天没用，移动归档</text>
  </g>

  <g stroke="#9bdcff" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M315 249 H420"/>
    <path d="M655 249 H760"/>
  </g>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="110" y="370" width="250" height="62" rx="15" fill="#1c2735" stroke="#60a5fa" stroke-width="2"/>
    <text x="136" y="408" fill="#dbeafe" font-size="18" font-weight="700">pin：完全跳过自动整理</text>

    <rect x="430" y="370" width="250" height="62" rx="15" fill="#1c2735" stroke="#a78bfa" stroke-width="2"/>
    <text x="456" y="408" fill="#eee8ff" font-size="18" font-weight="700">dry-run：只出报告，不改文件</text>

    <rect x="750" y="370" width="250" height="62" rx="15" fill="#1c2735" stroke="#34d399" stroke-width="2"/>
    <text x="776" y="408" fill="#dcfff1" font-size="18" font-weight="700">backup：真实运行前先快照</text>
  </g>
</svg>
