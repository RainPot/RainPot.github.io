  <text x="96" y="170" fill="#4B5563" font-family="Arial, sans-serif" font-size="34">官方文档里的动作可以拆成两个连续阶段：先产出覆盖地图，再补成可运行代码</text>

  <rect x="104" y="236" width="642" height="520" rx="24" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="2"/>
  <text x="144" y="296" fill="#0F172A" font-family="Arial, sans-serif" font-size="44" font-weight="700">阶段 A：Mapping</text>

