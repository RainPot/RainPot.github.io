  <text x="180" y="374" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">打开会话</text>
  <text x="180" y="426" fill="#475569" font-family="Arial, sans-serif" font-size="28">Map → New Flows</text>

