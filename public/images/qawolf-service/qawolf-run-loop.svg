<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1120" fill="#F8FAFC"/>
  <rect x="56" y="48" width="1488" height="1016" rx="28" fill="#FFFFFF" stroke="#D8E0EA" stroke-width="2"/>
  <text x="96" y="116" fill="#111827" font-family="Arial, sans-serif" font-size="56" font-weight="700">运行、重试、调查与清理</text>
  <text x="96" y="170" fill="#4B5563" font-family="Arial, sans-serif" font-size="34">QA Wolf 的发布信号来自运行状态，而不是单次 pass/fail</text>

  <text x="116" y="250" fill="#0F172A" font-family="Arial, sans-serif" font-size="40" font-weight="700">A. 运行触发与三轮尝试</text>
  <rect x="116" y="292" width="252" height="110" rx="16" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="150" y="330" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">触发 run</text>
  <text x="150" y="382" fill="#475569" font-family="Arial, sans-serif" font-size="28">手动 / 定时 / CI</text>

  <rect x="436" y="292" width="252" height="110" rx="16" fill="#ECFEFF" stroke="#67E8F9" stroke-width="2"/>
  <text x="470" y="330" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">第 1 次</text>
  <text x="470" y="382" fill="#475569" font-family="Arial, sans-serif" font-size="28">默认并发执行</text>

  <rect x="756" y="292" width="252" height="110" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="790" y="330" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">第 2 次</text>
  <text x="790" y="382" fill="#475569" font-family="Arial, sans-serif" font-size="28">失败项五个一批</text>

  <rect x="1076" y="292" width="252" height="110" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="1110" y="330" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">第 3 次</text>
  <text x="1110" y="382" fill="#475569" font-family="Arial, sans-serif" font-size="28">仍失败则串行</text>

  <path d="M380 347H416" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M416 347L400 331M416 347L400 363" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 347H736" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M736 347L720 331M736 347L720 363" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1020 347H1056" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M1056 347L1040 331M1056 347L1040 363" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="116" y="502" fill="#0F172A" font-family="Arial, sans-serif" font-size="40" font-weight="700">B. 运行状态如何解释</text>
  <rect x="116" y="544" width="360" height="122" rx="18" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="154" y="584" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Completed</text>
  <text x="154" y="636" fill="#475569" font-family="Arial, sans-serif" font-size="28">全部通过或已标记</text>

  <rect x="620" y="544" width="360" height="122" rx="18" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  <text x="658" y="584" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Needs Investigation</text>
  <text x="658" y="636" fill="#475569" font-family="Arial, sans-serif" font-size="28">仍有失败未处理</text>

  <rect x="1124" y="544" width="360" height="122" rx="18" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1162" y="584" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Canceled</text>
  <text x="1162" y="636" fill="#475569" font-family="Arial, sans-serif" font-size="28">同分支环境有新 run</text>

  <rect x="650" y="438" width="300" height="64" rx="32" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="704" y="480" fill="#475569" font-family="Arial, sans-serif" font-size="30" font-weight="700">运行状态汇总</text>
  <path d="M1202 420V470H972" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M972 470L988 454M972 470L988 486" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="116" y="766" fill="#0F172A" font-family="Arial, sans-serif" font-size="40" font-weight="700">C. 失败进入 Investigation 后的决策</text>
  <rect x="116" y="808" width="276" height="154" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="150" y="852" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">收集证据</text>
  <text x="150" y="902" fill="#475569" font-family="Arial, sans-serif" font-size="28">失败行 / attempt</text>
  <text x="150" y="944" fill="#475569" font-family="Arial, sans-serif" font-size="28">视频 / 日志 / trace</text>

  <rect x="492" y="808" width="276" height="154" rx="18" fill="#ECFEFF" stroke="#67E8F9" stroke-width="2"/>
  <text x="526" y="852" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Flake</text>
  <text x="526" y="902" fill="#475569" font-family="Arial, sans-serif" font-size="28">重试最新版本</text>
  <text x="526" y="944" fill="#475569" font-family="Arial, sans-serif" font-size="28">或复制完整 run</text>

  <rect x="844" y="808" width="276" height="154" rx="18" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="878" y="852" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">产品 Bug</text>
  <text x="878" y="902" fill="#475569" font-family="Arial, sans-serif" font-size="28">提交 bug report</text>
  <text x="878" y="944" fill="#475569" font-family="Arial, sans-serif" font-size="28">优先级影响状态</text>

  <rect x="1196" y="808" width="276" height="154" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="1230" y="852" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">测试坏了</text>
  <text x="1230" y="902" fill="#475569" font-family="Arial, sans-serif" font-size="28">修代码或建维护单</text>
  <text x="1230" y="944" fill="#475569" font-family="Arial, sans-serif" font-size="28">维护期跳过调度</text>

  <path d="M404 871H472" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M472 871L456 855M472 871L456 887" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M780 871H824" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M824 871L808 855M824 871L808 887" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1132 871H1176" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M1176 871L1160 855M1176 871L1160 887" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="410" y="982" width="780" height="52" rx="26" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="452" y="1018" fill="#475569" font-family="Arial, sans-serif" font-size="30">所有失败项被重试、修复、绕过、挂 Bug 或维护后，run 才能回到 Completed</text>
</svg>
