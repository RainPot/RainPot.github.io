<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="980" viewBox="0 0 1520 980" role="img" aria-labelledby="title desc">
  <title id="title">ComputerAgent 每轮执行闭环</title>
  <desc id="desc">ComputerAgent 从输入消息开始，经过回调、模型 predict_step、工具调用、动作执行、截图反馈和继续条件判断的循环。</desc>
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#334155" />
    </marker>
    <style>
      text { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; letter-spacing: 0; }
      .title { font-size: 42px; font-weight: 760; }
      .subtitle { font-size: 27px; fill: #596579; }
      .step { font-size: 26px; font-weight: 760; }
      .body { font-size: 22px; fill: #475569; }
      .note { font-size: 20px; fill: #64748b; }
      .box { fill: #ffffff; stroke-width: 3; rx: 18; }
      .line { fill: none; stroke: #334155; stroke-width: 4; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #64748b; stroke-width: 3.5; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1520" height="980" fill="#f8fafc" />
  <text class="title" x="760" y="72" text-anchor="middle">ComputerAgent 的单轮 GUIAgent 闭环</text>
  <text class="subtitle" x="760" y="116" text-anchor="middle">模型只负责“下一步”，动作执行和截图反馈由外层 Agent 统一完成</text>

  <rect class="box" x="96" y="220" width="260" height="140" stroke="#38bdf8" />
  <text class="step" x="226" y="268" text-anchor="middle">1. 输入</text>
  <text class="body" x="226" y="314" text-anchor="middle">用户消息</text>
  <text class="body" x="226" y="346" text-anchor="middle">旧历史 + 新输出</text>

  <rect class="box" x="440" y="220" width="280" height="140" stroke="#22c55e" />
  <text class="step" x="580" y="268" text-anchor="middle">2. 回调预处理</text>
  <text class="body" x="580" y="314" text-anchor="middle">instructions / PII</text>
  <text class="body" x="580" y="346" text-anchor="middle">图片保留策略</text>

  <rect class="box" x="804" y="220" width="288" height="140" stroke="#f59e0b" />
  <text class="step" x="948" y="268" text-anchor="middle">3. predict_step</text>
  <text class="body" x="948" y="314" text-anchor="middle">OpenAI / Claude</text>
  <text class="body" x="948" y="346" text-anchor="middle">UI-TARS / VLM</text>

  <rect class="box" x="1180" y="220" width="250" height="140" stroke="#a855f7" />
  <text class="step" x="1305" y="268" text-anchor="middle">4. 统一输出</text>
  <text class="body" x="1305" y="314" text-anchor="middle">message</text>
  <text class="body" x="1305" y="346" text-anchor="middle">computer_call</text>

  <rect class="box" x="1180" y="500" width="250" height="150" stroke="#ef4444" />
  <text class="step" x="1305" y="548" text-anchor="middle">5. 执行动作</text>
  <text class="body" x="1305" y="594" text-anchor="middle">click / type / drag</text>
  <text class="body" x="1305" y="626" text-anchor="middle">function tools</text>

  <rect class="box" x="804" y="500" width="288" height="150" stroke="#06b6d4" />
  <text class="step" x="948" y="548" text-anchor="middle">6. 再截图</text>
  <text class="body" x="948" y="594" text-anchor="middle">screenshot_delay</text>
  <text class="body" x="948" y="626" text-anchor="middle">computer_call_output</text>

  <rect class="box" x="440" y="500" width="280" height="150" stroke="#84cc16" />
  <text class="step" x="580" y="548" text-anchor="middle">7. 写回历史</text>
  <text class="body" x="580" y="594" text-anchor="middle">追加 partial_items</text>
  <text class="body" x="580" y="626" text-anchor="middle">触发回调记录</text>

  <rect class="box" x="96" y="500" width="260" height="150" stroke="#f97316" />
  <text class="step" x="226" y="548" text-anchor="middle">8. 是否继续</text>
  <text class="body" x="226" y="594" text-anchor="middle">最后不是 assistant</text>
  <text class="body" x="226" y="626" text-anchor="middle">且预算允许</text>

  <path class="line" d="M356 290 H434" />
  <path class="line" d="M720 290 H798" />
  <path class="line" d="M1092 290 H1174" />
  <path class="line" d="M1305 360 V494" />
  <path class="line" d="M1180 575 H1098" />
  <path class="line" d="M804 575 H726" />
  <path class="line" d="M440 575 H362" />
  <path class="soft" d="M226 500 C226 425 226 420 226 366" />
  <text class="note" x="226" y="430" text-anchor="middle">继续下一轮</text>

  <rect x="500" y="760" width="520" height="92" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2.5" />
  <text class="step" x="760" y="800" text-anchor="middle">停止条件</text>
  <text class="body" x="760" y="838" text-anchor="middle">模型返回最终 assistant message，或回调要求中断</text>
  <path class="soft" d="M226 650 C226 806 492 806 494 806" />
  <path class="soft" d="M760 760 C760 710 760 682 760 652" />
</svg>
