<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="900" viewBox="0 0 1520 900" role="img" aria-labelledby="title desc">
  <title id="title">CUA 项目与 GUIAgent 分层总览</title>
  <desc id="desc">从用户入口到 ComputerAgent、模型 loop、Computer 抽象、computer-server 和操作系统执行器的分层关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#334155" />
    </marker>
    <style>
      text { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; letter-spacing: 0; }
      .title { font-size: 42px; font-weight: 760; }
      .subtitle { font-size: 27px; fill: #596579; }
      .lane { font-size: 25px; font-weight: 740; fill: #475569; }
      .box-title { font-size: 30px; font-weight: 760; }
      .box-text { font-size: 24px; fill: #475569; }
      .small { font-size: 21px; fill: #64748b; }
      .box { fill: #ffffff; stroke-width: 3; rx: 18; }
      .line { fill: none; stroke: #334155; stroke-width: 4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 3.5; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1520" height="900" fill="#f8fafc" />
  <text class="title" x="760" y="72" text-anchor="middle">CUA：把 GUIAgent 跑在真实电脑上的分层</text>
  <text class="subtitle" x="760" y="116" text-anchor="middle">Agent SDK 统一模型输出，Computer / Sandbox 统一执行环境，Server 统一系统动作</text>

  <text class="lane" x="120" y="185">入口</text>
  <text class="lane" x="390" y="185">Agent SDK</text>
  <text class="lane" x="700" y="185">模型 loop</text>
  <text class="lane" x="1015" y="185">Computer 抽象</text>
  <text class="lane" x="1288" y="185">执行底座</text>

  <rect class="box" x="64" y="220" width="210" height="380" stroke="#38bdf8" />
  <text class="box-title" x="169" y="270" text-anchor="middle">调用入口</text>
  <text class="box-text" x="169" y="325" text-anchor="middle">Notebook</text>
  <text class="box-text" x="169" y="375" text-anchor="middle">CLI</text>
  <text class="box-text" x="169" y="425" text-anchor="middle">Playground</text>
  <text class="box-text" x="169" y="475" text-anchor="middle">/responses</text>
  <text class="small" x="169" y="540" text-anchor="middle">都进入同一个</text>
  <text class="small" x="169" y="572" text-anchor="middle">ComputerAgent</text>

  <rect class="box" x="324" y="220" width="260" height="380" stroke="#22c55e" />
  <text class="box-title" x="454" y="270" text-anchor="middle">ComputerAgent</text>
  <text class="box-text" x="454" y="326" text-anchor="middle">选择 loop</text>
  <text class="box-text" x="454" y="376" text-anchor="middle">处理工具</text>
  <text class="box-text" x="454" y="426" text-anchor="middle">执行动作</text>
  <text class="box-text" x="454" y="476" text-anchor="middle">追加截图</text>
  <text class="small" x="454" y="540" text-anchor="middle">Responses items</text>
  <text class="small" x="454" y="572" text-anchor="middle">是统一协议</text>

  <rect class="box" x="634" y="220" width="270" height="380" stroke="#f59e0b" />
  <text class="box-title" x="769" y="270" text-anchor="middle">多种 GUI loop</text>
  <text class="box-text" x="769" y="326" text-anchor="middle">OpenAI / Claude</text>
  <text class="box-text" x="769" y="376" text-anchor="middle">UI-TARS</text>
  <text class="box-text" x="769" y="426" text-anchor="middle">Generic VLM</text>
  <text class="box-text" x="769" y="476" text-anchor="middle">OmniParser</text>
  <text class="box-text" x="769" y="526" text-anchor="middle">Composed</text>

  <rect class="box" x="954" y="220" width="250" height="380" stroke="#a855f7" />
  <text class="box-title" x="1079" y="270" text-anchor="middle">Computer tool</text>
  <text class="box-text" x="1079" y="326" text-anchor="middle">Computer</text>
  <text class="box-text" x="1079" y="376" text-anchor="middle">Sandbox</text>
  <text class="box-text" x="1079" y="426" text-anchor="middle">Custom dict</text>
  <text class="small" x="1079" y="500" text-anchor="middle">统一成</text>
  <text class="small" x="1079" y="532" text-anchor="middle">AsyncComputerHandler</text>

  <rect class="box" x="1254" y="220" width="210" height="380" stroke="#ef4444" />
  <text class="box-title" x="1359" y="270" text-anchor="middle">系统执行</text>
  <text class="box-text" x="1359" y="326" text-anchor="middle">computer-server</text>
  <text class="box-text" x="1359" y="376" text-anchor="middle">OS handlers</text>
  <text class="box-text" x="1359" y="426" text-anchor="middle">鼠标键盘</text>
  <text class="box-text" x="1359" y="476" text-anchor="middle">截图 / Shell</text>
  <text class="small" x="1359" y="540" text-anchor="middle">mac / win / linux</text>
  <text class="small" x="1359" y="572" text-anchor="middle">android</text>

  <path class="line" d="M274 410 H318" />
  <path class="line" d="M584 410 H628" />
  <path class="line" d="M904 410 H948" />
  <path class="line" d="M1204 410 H1248" />
  <path class="dash" d="M1359 620 C1359 650 454 650 454 612" />
  <text class="small" x="900" y="642" text-anchor="middle">动作后的 screenshot 回到历史，驱动下一轮决策</text>

  <rect x="172" y="672" width="218" height="76" rx="16" fill="#ecfeff" stroke="#67e8f9" stroke-width="2" />
  <text class="small" x="281" y="716" text-anchor="middle">轨迹保存</text>
  <rect x="420" y="672" width="218" height="76" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
  <text class="small" x="529" y="716" text-anchor="middle">图片裁剪</text>
  <rect x="668" y="672" width="218" height="76" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="2" />
  <text class="small" x="777" y="716" text-anchor="middle">预算中断</text>
  <rect x="916" y="672" width="218" height="76" rx="16" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2" />
  <text class="small" x="1025" y="716" text-anchor="middle">遥测回调</text>
  <path class="dash" d="M529 672 V612" />
  <path class="dash" d="M777 672 V612" />
  <path class="dash" d="M1025 672 V612" />
</svg>
