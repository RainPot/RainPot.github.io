<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill:#111827; font-size:26px; font-weight:700; }
    .sub { fill:#4b5563; font-size:15px; }
    .lane-title { fill:#6b7280; font-size:12px; font-weight:700; letter-spacing:.08em; }
    .node-title { fill:#111827; font-size:15px; font-weight:700; }
    .node-sub { fill:#374151; font-size:12px; }
    .tiny { fill:#6b7280; font-size:11px; }
    .caption { fill:#6b7280; font-size:12px; font-weight:600; }
    .box { fill:#f9fafb; stroke:#e5e7eb; stroke-width:1.2; rx:8; }
    .box2 { fill:#ffffff; stroke:#d1d5db; stroke-width:1.2; rx:8; }
    .blue { fill:#eff6ff; stroke:#93c5fd; }
    .green { fill:#ecfdf5; stroke:#86efac; }
    .orange { fill:#fff7ed; stroke:#fdba74; }
    .purple { fill:#f5f3ff; stroke:#c4b5fd; }
    .rose { fill:#fff1f2; stroke:#fda4af; }
    .slate { fill:#f8fafc; stroke:#cbd5e1; }
    .edge { fill:none; stroke:#3b82f6; stroke-width:2; marker-end:url(#arrow-blue); }
    .edge2 { fill:none; stroke:#10b981; stroke-width:2; marker-end:url(#arrow-green); }
    .edge3 { fill:none; stroke:#f97316; stroke-width:2; marker-end:url(#arrow-orange); }
    .edge4 { fill:none; stroke:#8b5cf6; stroke-width:2; marker-end:url(#arrow-purple); }
    .dash { fill:none; stroke:#9ca3af; stroke-width:1.6; stroke-dasharray:5 4; marker-end:url(#arrow-gray); }
    .container { fill:none; stroke:#e5e7eb; stroke-width:1.2; stroke-dasharray:6 5; rx:10; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#3b82f6"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#10b981"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#f97316"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#8b5cf6"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#9ca3af"/></marker>
  </defs>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="48" y="52" class="title">jcode Memory 的非阻塞 Turn 链路</text>
  <text x="48" y="78" class="sub">当前请求不等待 Memory；本轮上下文只为下一轮准备 pending memory。</text>

<rect x="50" y="118" width="140" height="44" class="box2"/><text x="120" y="146" text-anchor="middle" class="node-title">User</text>
<line x1="120" y1="162" x2="120" y2="675" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="5 5"/>
<rect x="320" y="118" width="140" height="44" class="box2"/><text x="390" y="146" text-anchor="middle" class="node-title">TUI / Main Agent</text>
<line x1="390" y1="162" x2="390" y2="675" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="5 5"/>
<rect x="605" y="118" width="140" height="44" class="box2"/><text x="675" y="146" text-anchor="middle" class="node-title">PendingMemory</text>
<line x1="675" y1="162" x2="675" y2="675" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="5 5"/>
<rect x="890" y="118" width="140" height="44" class="box2"/><text x="960" y="146" text-anchor="middle" class="node-title">MemoryAgent</text>
<line x1="960" y1="162" x2="960" y2="675" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="5 5"/>
<rect x="1140" y="118" width="140" height="44" class="box2"/><text x="1210" y="146" text-anchor="middle" class="node-title">LLM Provider</text>
<line x1="1210" y1="162" x2="1210" y2="675" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="5 5"/>
<path d="M120,210 L390,210" class="edge"/>
<rect x="194.0" y="184" width="131" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="200.0" y="200" class="tiny">1 fresh user turn</text>
<path d="M390,270 L675,270" class="edge2"/>
<rect x="471.5" y="244" width="138" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="477.5" y="260" class="tiny">2 take N-1 pending</text>
<path d="M675,330 L390,330" class="edge2"/>
<rect x="471.5" y="304" width="124" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="477.5" y="320" class="tiny">3 inject #Memory</text>
<path d="M390,410 L1210,410" class="edge"/>
<rect x="739.0" y="384" width="159" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="745.0" y="400" class="tiny">4 complete_split(...)</text>
<path d="M390,500 L960,500" class="dash"/>
<rect x="614.0" y="474" width="138" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="620.0" y="490" class="tiny">5 try_send context</text>
<path d="M960,585 L675,585" class="edge3"/>
<rect x="756.5" y="559" width="159" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="762.5" y="575" class="tiny">6 set_pending for N+1</text>
<rect x="315" y="550" width="150" height="86" class="box blue"/>
<text x="333" y="580" class="node-title">No wait</text>
<text x="333" y="604" class="node-sub">Memory runs aside</text>
<text x="333" y="626" class="node-sub">provider call starts</text>
<rect x="880" y="620" width="190" height="62" class="box orange"/>
<text x="898" y="650" class="node-title">Background work</text>
<text x="898" y="674" class="node-sub">retrieval · rerank · upkeep</text>
<rect x="1020" y="690" width="206" height="28" rx="14" fill="#fff7ed" stroke="#fdba74"/><text x="1032" y="709" class="tiny">pending expires after 120s</text>
</svg>