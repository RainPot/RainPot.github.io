<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">jcode Memory Architecture</title>
  <desc id="desc">Non-blocking memory architecture in jcode: TUI consumes pending memory from previous turn, sends current context to background MemoryAgent, retrieves and reranks memories, then stores pending result for next turn.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#93c5fd"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#86efac"/>
    </marker>
    <style>
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .subtitle{font:500 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
      .label{font:700 20px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .small{font:500 15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
      .tiny{font:500 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}
      .box{rx:20;filter:url(#shadow);stroke-width:1.5}
      .flow{fill:none;stroke:#93c5fd;stroke-width:3;marker-end:url(#arrow)}
      .flowG{fill:none;stroke:#86efac;stroke-width:3;marker-end:url(#arrowGreen)}
      .dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:8 8}
      .chip{rx:14;fill:#1e293b;stroke:#334155;stroke-width:1}
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="70" y="70" class="title">jcode Memory：把记忆做成异步旁路，而不是同步 RAG</text>
  <text x="70" y="102" class="subtitle">当前 turn 只消费上一轮算好的 pending memory；本轮上下文被送到 MemoryAgent，为下一轮准备记忆。</text>

  <rect x="70" y="160" width="350" height="170" class="box" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="100" y="205" class="label">TUI / Main Agent</text>
  <text x="100" y="240" class="small">build_memory_prompt_nonblocking()</text>
  <text x="100" y="268" class="small">take_pending_memory(session)</text>
  <text x="100" y="296" class="small">complete_split(messages, tools, prompt)</text>

  <rect x="525" y="145" width="350" height="200" class="box" fill="#064e3b" stroke="#34d399"/>
  <text x="555" y="190" class="label">PendingMemory</text>
  <text x="555" y="225" class="small">prompt / display_prompt</text>
  <text x="555" y="253" class="small">memory_ids / count / computed_at</text>
  <text x="555" y="281" class="small">freshness: 120s</text>
  <text x="555" y="309" class="small">dedupe: prompt + memory-id set</text>

  <rect x="980" y="160" width="350" height="170" class="box" fill="#581c87" stroke="#c084fc"/>
  <text x="1010" y="205" class="label">MemoryAgent</text>
  <text x="1010" y="240" class="small">mpsc Context updates</text>
  <text x="1010" y="268" class="small">per-session state</text>
  <text x="1010" y="296" class="small">topic / cadence / surfaced IDs</text>

  <path class="flowG" d="M420 235 C455 235 485 235 525 235"/>
  <text x="438" y="220" class="tiny">Turn N consumes N-1</text>
  <path class="flow" d="M875 245 C920 245 940 245 980 245"/>
  <text x="900" y="230" class="tiny">queued result</text>
  <path class="flow" d="M250 330 C250 400 1130 400 1130 330"/>
  <text x="565" y="385" class="tiny">after fresh user turn: update_context_sync_with_dir(...)</text>

  <rect x="70" y="500" width="260" height="180" class="box" fill="#172554" stroke="#38bdf8"/>
  <text x="100" y="545" class="label">Context Builder</text>
  <text x="100" y="580" class="small">recent 12 messages</text>
  <text x="100" y="608" class="small">drop tool noise</text>
  <text x="100" y="636" class="small">focused query = latest intent</text>

  <rect x="395" y="500" width="260" height="180" class="box" fill="#14532d" stroke="#86efac"/>
  <text x="425" y="545" class="label">Retrieval</text>
  <text x="425" y="580" class="small">dense embedding</text>
  <text x="425" y="608" class="small">BM25 lexical search</text>
  <text x="425" y="636" class="small">RRF hybrid fusion</text>

  <rect x="720" y="500" width="260" height="180" class="box" fill="#4c1d95" stroke="#c084fc"/>
  <text x="750" y="545" class="label">LLM Judge</text>
  <text x="750" y="580" class="small">listwise rerank</text>
  <text x="750" y="608" class="small">consensus votes</text>
  <text x="750" y="636" class="small">only judged items surface</text>

  <rect x="1045" y="500" width="285" height="180" class="box" fill="#7c2d12" stroke="#fb923c"/>
  <text x="1075" y="545" class="label">Memory Graph</text>
  <text x="1075" y="580" class="small">project/global JSON stores</text>
  <text x="1075" y="608" class="small">memory / tag / cluster nodes</text>
  <text x="1075" y="636" class="small">RelatesTo / Supersedes / Contradicts</text>

  <path class="flow" d="M330 590 C350 590 370 590 395 590"/>
  <path class="flow" d="M655 590 C680 590 695 590 720 590"/>
  <path class="flow" d="M980 590 C1005 590 1020 590 1045 590"/>
  <path class="flowG" d="M1188 500 C1188 430 1135 400 1135 330"/>
  <text x="1030" y="450" class="tiny">set_pending_memory(...)</text>

  <rect x="70" y="720" width="1260" height="48" class="chip"/>
  <text x="100" y="751" class="small">关键取舍：主路径不等 memory；召回靠 hybrid 拉候选，LLM 只做精确裁决；写入靠 session/topic/periodic extraction 与图维护延迟发生。</text>
</svg>
