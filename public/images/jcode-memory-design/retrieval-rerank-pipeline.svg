<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill:#111827; font-size:26px; font-weight:700; }
    .sub { fill:#4b5563; font-size:15px; }
    .lane-title { fill:#6b7280; font-size:12px; font-weight:700; letter-spacing:.08em; }
    .node-title { fill:#111827; font-size:15px; font-weight:700; }
    .node-sub { fill:#374151; font-size:12px; }
    .tiny { fill:#6b7280; font-size:11px; }
    .caption { fill:#6b7280; font-size:12px; font-weight:600; }
    .box { fill:#f9fafb; stroke:#e5e7eb; stroke-width:1.2; rx:8; }
    .box2 { fill:#ffffff; stroke:#d1d5db; stroke-width:1.2; rx:8; }
    .blue { fill:#eff6ff; stroke:#93c5fd; }
    .green { fill:#ecfdf5; stroke:#86efac; }
    .orange { fill:#fff7ed; stroke:#fdba74; }
    .purple { fill:#f5f3ff; stroke:#c4b5fd; }
    .rose { fill:#fff1f2; stroke:#fda4af; }
    .slate { fill:#f8fafc; stroke:#cbd5e1; }
    .edge { fill:none; stroke:#3b82f6; stroke-width:2; marker-end:url(#arrow-blue); }
    .edge2 { fill:none; stroke:#10b981; stroke-width:2; marker-end:url(#arrow-green); }
    .edge3 { fill:none; stroke:#f97316; stroke-width:2; marker-end:url(#arrow-orange); }
    .edge4 { fill:none; stroke:#8b5cf6; stroke-width:2; marker-end:url(#arrow-purple); }
    .dash { fill:none; stroke:#9ca3af; stroke-width:1.6; stroke-dasharray:5 4; marker-end:url(#arrow-gray); }
    .container { fill:none; stroke:#e5e7eb; stroke-width:1.2; stroke-dasharray:6 5; rx:10; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#3b82f6"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#10b981"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#f97316"/></marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#8b5cf6"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7 Z" fill="#9ca3af"/></marker>
  </defs>
  <rect width="1500" height="860" fill="#ffffff"/>
  <text x="48" y="52" class="title">jcode Memory 的召回与裁决路径</text>
  <text x="48" y="78" class="sub">先用 hybrid retrieval 拉候选，再用 LLM listwise consensus judge 决定是否注入。</text>

<rect x="60" y="150" width="210" height="105" class="box blue"/>
<text x="78" y="180" class="node-title">Context window</text>
<text x="78" y="204" class="node-sub">last 12 messages</text>
<text x="78" y="226" class="node-sub">tool noise mostly dropped</text>
<rect x="330" y="150" width="210" height="105" class="box blue"/>
<text x="348" y="180" class="node-title">Focused query</text>
<text x="348" y="204" class="node-sub">latest user intent first</text>
<text x="348" y="226" class="node-sub">strip reminders/tools</text>
<rect x="600" y="120" width="230" height="92" class="box green"/>
<text x="618" y="150" class="node-title">Dense search</text>
<text x="618" y="174" class="node-sub">embed_query_active</text>
<text x="618" y="196" class="node-sub">same embedding_model only</text>
<rect x="600" y="245" width="230" height="92" class="box green"/>
<text x="618" y="275" class="node-title">BM25 search</text>
<text x="618" y="299" class="node-sub">search_text = content + tags</text>
<text x="618" y="321" class="node-sub">paths / identifiers work</text>
<rect x="900" y="170" width="210" height="105" class="box orange"/>
<text x="918" y="200" class="node-title">RRF fusion</text>
<text x="918" y="224" class="node-sub">merge dense + lexical</text>
<text x="918" y="246" class="node-sub">candidate pool ≥ 50</text>
<rect x="1170" y="150" width="260" height="125" class="box purple"/>
<text x="1188" y="180" class="node-title">LLM consensus rerank</text>
<text x="1188" y="204" class="node-sub">listwise prompt</text>
<text x="1188" y="226" class="node-sub">votes / min_agree</text>
<text x="1188" y="248" class="node-sub">max 5 surfaced</text>
<path d="M270,202 L330,202" class="edge"/>
<path d="M540,202 L600,166" class="edge2"/>
<path d="M540,202 L600,291" class="edge2"/>
<path d="M830,166 L900,210" class="edge3"/>
<path d="M830,291 L900,232" class="edge3"/>
<path d="M1110,222 L1170,212" class="edge4"/>
<rect x="1170" y="350" width="260" height="105" class="box green"/>
<text x="1188" y="380" class="node-title">PendingMemory</text>
<text x="1188" y="404" class="node-sub">prompt + memory_ids</text>
<text x="1188" y="426" class="node-sub">fresh for 120s</text>
<text x="1188" y="448" class="node-sub">dedupe before injection</text>
<path d="M1300,275 L1300,350" class="edge2"/>
<rect x="1304" y="309" width="89" height="21" rx="5" fill="#ffffff" opacity="0.96"/><text x="1310" y="325" class="tiny">set_pending</text>
<rect x="90" y="485" width="260" height="130" class="box slate"/>
<text x="108" y="515" class="node-title">Already injected filter</text>
<text x="108" y="539" class="node-sub">session surfaced_ids</text>
<text x="108" y="561" class="node-sub">45min injected-id TTL</text>
<text x="108" y="583" class="node-sub">avoid echo in transcript</text>
<rect x="430" y="485" width="260" height="130" class="box rose"/>
<text x="448" y="515" class="node-title">Judge failure policy</text>
<text x="448" y="539" class="node-sub">no unvetted hybrid fallback</text>
<text x="448" y="561" class="node-sub">carry last verified set</text>
<text x="448" y="583" class="node-sub">dormant if no backend</text>
<rect x="770" y="485" width="260" height="130" class="box orange"/>
<text x="788" y="515" class="node-title">No-sidecar fallback</text>
<text x="788" y="539" class="node-sub">only explicit opt-out</text>
<text x="788" y="561" class="node-sub">dynamic gate 1..5</text>
<text x="788" y="583" class="node-sub">lower precision by design</text>
<rect x="1110" y="485" width="260" height="130" class="box purple"/>
<text x="1128" y="515" class="node-title">Post-retrieval upkeep</text>
<text x="1128" y="539" class="node-sub">boost verified</text>
<text x="1128" y="561" class="node-sub">decay rejected</text>
<text x="1128" y="583" class="node-sub">link co-relevant memories</text>
<path d="M1280,455 C1280,470 1240,485 1240,485" class="dash"/>
<rect x="60" y="700" width="1370" height="62" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="88" y="728" class="node-sub">设计含义：embedding/BM25 负责 recall，LLM 负责 precision；如果 judge 不可用，jcode 宁可少注入，也不把未裁决的候选直接塞给主 Agent。</text>
</svg>